<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <script>
        // Gelen path'i al
        var path = window.location.pathname;

        // Ana sayfaya yönlendir ama path'i koru
        window.location.replace("/#" + path);
    </script>
</head>

<body>
    <h2>Yönlendiriliyor...</h2>
</body>

</html>
