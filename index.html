<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Ugrak</title>

    <script>
        const hash = window.location.hash;

        if (hash.includes("/koleksiyon/")) {
            const id = hash.split("/")[2];

            // App açmayı dene
            window.location.href = "https://haticeeakgull.github.io/koleksiyon/" + id;

            // App yoksa Play Store
            setTimeout(() => {
                window.location.href = "https://play.google.com/store/apps/details?id=com.example.ugrak_mekan_app";
            }, 2000);
        }
    </script>
</head>

<body>
    <h2>Uygulamaya yönlendiriliyorsun...</h2>
</body>

</html>
